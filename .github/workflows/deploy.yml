name: CI/CD Pipeline

on:
  push:
    branches: [ "prod" ]
  pull_request:
    branches: [ "prod" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Unit Tests
      run: npm test

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

  deploy:
    name: Deploy to Oracle VM
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Deploy using SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        port: 22
        script: |
          # 프로젝트 경로 설정
          PROJECT_DIR=~/Constella

          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project directory does not exist. Cloning..."
            git clone -b prod https://github.com/team-campfire-dev/Constella.git "$PROJECT_DIR"
            cd "$PROJECT_DIR"
          else
            echo "Project directory exists. Trying to pull..."
            cd "$PROJECT_DIR"
            if ! git pull origin prod; then
              echo "Git pull failed. Re-cloning..."
              cd ~
              rm -rf "$PROJECT_DIR"
              git clone -b prod https://github.com/team-campfire-dev/Constella.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            fi
          fi
          
          # .env 생성 (GitHub Secrets에서 주입)
          echo "${{ secrets.ENV_FILE }}" > .env
          
          # Docker 컨테이너 재빌드 및 실행
          docker compose up -d --build

          # DB 전체 초기화 (Main + Content + Neo4j)
          echo "Resetting Databases..."
          docker compose exec -T app npx prisma db push --force-reset --accept-data-loss
          docker compose exec -T app npx prisma db push --force-reset --accept-data-loss --schema=prisma/content/schema.prisma
          
          # Neo4j 그래프 초기화
          echo "Resetting Neo4j Graph..."
          docker compose exec -T app node -e "
            const neo4j = require('neo4j-driver');
            const driver = neo4j.driver(
              process.env.NEO4J_URI,
              neo4j.auth.basic(process.env.NEO4J_USER, process.env.NEO4J_PASSWORD)
            );
            const session = driver.session();
            session.run('MATCH (n) DETACH DELETE n')
              .then(() => console.log('Neo4j cleared'))
              .then(() => session.close())
              .then(() => driver.close())
              .catch(e => { console.error(e); process.exit(1); });
          "

          # 불필요한 이미지 정리
          docker image prune -f
